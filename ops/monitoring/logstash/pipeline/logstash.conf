input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => line
  }
}

filter {
  if [message] =~ "^<[0-9]+>1 " {
    grok {
      match => {
        "message" => "^<%{NONNEGINT:[log][syslog][priority]}>1 %{TIMESTAMP_ISO8601:[@metadata][syslog_ts]} %{HOSTNAME:[host][name]} %{DATA:[service][name]} %{DATA:[process][pid]} - - %{GREEDYDATA:[event][original]}$"
      }
      tag_on_failure => ["_grokparsefailure_logspout_syslog"]
    }

    date {
      match => ["[@metadata][syslog_ts]", "ISO8601"]
      target => "@timestamp"
    }

    if ![service][name] {
      mutate {
        add_field => { "[service][name]" => "amdm" }
      }
    }

    if [event][original] {
      mutate {
        replace => { "message" => "%{[event][original]}" }
      }
      grok {
        match => { "message" => "level=%{WORD:[log][level]}" }
        tag_on_failure => []
      }
    }

    mutate {
      add_field => { "[event][dataset]" => "amdm.logs" }
      remove_field => ["[@metadata][syslog_ts]"]
    }
  }

  if [message] =~ "^\s*\{" {
    json {
      source => "message"
      target => "json_payload"
      skip_on_invalid_json => true
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Emit logs into ECS-style data streams so Kibana Observability can pick them up.
    data_stream => true
    data_stream_type => "logs"
    data_stream_dataset => "amdm"
    data_stream_namespace => "default"
  }
}
