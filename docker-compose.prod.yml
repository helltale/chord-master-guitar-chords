services:
  postgres:
    image: postgres:16-alpine
    container_name: amdm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  back:
    image: ghcr.io/${GHCR_OWNER:-helltale}/chord-master-back:latest
    pull_policy: always
    container_name: amdm-back
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/${GHCR_OWNER:-helltale}/chord-master-web:latest
    pull_policy: always
    container_name: amdm-web
    ports:
      - "8080:80"
    depends_on:
      - back

  prometheus:
    image: prom/prometheus:latest
    container_name: amdm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - back

  grafana:
    image: grafana/grafana:latest
    container_name: amdm-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

  db-backup:
    image: postgres:16-alpine
    container_name: amdm-db-backup
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SEC: ${BACKUP_INTERVAL_SEC:-21600}
      BACKUP_KEEP: ${BACKUP_KEEP:-10}
      BACKUP_WAIT_TIMEOUT_SEC: ${BACKUP_WAIT_TIMEOUT_SEC:-60}
      BACKUP_CHECK_BACKEND_HEALTH: ${BACKUP_CHECK_BACKEND_HEALTH:-false}
      BACKEND_HEALTH_URL: ${BACKEND_HEALTH_URL:-http://back:8081/healthz}
    volumes:
      - ./backups:/backups
      - ./ops/db-backup.sh:/usr/local/bin/db-backup.sh:ro
    command: ["/bin/sh", "/usr/local/bin/db-backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      back:
        condition: service_started

  db-prune-song-opens:
    image: postgres:16-alpine
    container_name: amdm-db-prune-song-opens
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      KEEP_DAYS: ${SONG_OPENS_KEEP_DAYS:-45}
      PRUNE_INTERVAL_SEC: ${SONG_OPENS_PRUNE_INTERVAL_SEC:-86400}
      PRUNE_WAIT_TIMEOUT_SEC: ${SONG_OPENS_PRUNE_WAIT_TIMEOUT_SEC:-60}
    volumes:
      - ./ops/prune-song-opens.sh:/usr/local/bin/prune-song-opens.sh:ro
    command: ["/bin/sh", "/usr/local/bin/prune-song-opens.sh"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
