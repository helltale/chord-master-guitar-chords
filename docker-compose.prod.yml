services:
  postgres:
    image: postgres:16-alpine
    container_name: amdm-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  back:
    image: ghcr.io/${GHCR_OWNER:-andreev}/chord-master-back:latest
    pull_policy: always
    container_name: amdm-back
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      SERVER_PORT: ${SERVER_PORT}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/${GHCR_OWNER:-andreev}/chord-master-web:latest
    pull_policy: always
    container_name: amdm-web
    ports:
      - "8080:80"
    depends_on:
      - back

volumes:
  postgres_data:
